name: Jakpost Popular Scraper

on:
  schedule:
    - cron: "0 2 * * *"   # 09:00 WIB
    - cron: "0 14 * * *"  # 21:00 WIB
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scrape.py

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: popular-csv
          path: popular.csv
